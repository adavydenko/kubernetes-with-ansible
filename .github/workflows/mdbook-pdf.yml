name: mdBook PDF

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pdf:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build mdBook docker image
        run: docker build -t kubernetes-with-ansible-mdbook:0.4.40 docs

      - name: Build HTML book
        run: docker run --rm -v "$PWD:/workspace" -w /workspace kubernetes-with-ansible-mdbook:0.4.40 build docs

      - name: Install WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y weasyprint fonts-dejavu-core

      - name: Build PDF from print.html
        run: |
          mkdir -p docs/dist
          cd docs/book
          weasyprint print.html ../dist/study-guide.pdf

      - name: Copy PDF into book assets for GitHub Pages
        run: |
          # After docker build, docs/book is often owned by root; use sudo for writes.
          sudo mkdir -p docs/book/assets
          sudo cp docs/dist/study-guide.pdf docs/book/assets/study-guide.pdf
          sudo chown "$(id -u):$(id -g)" docs/book/assets/study-guide.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: study-guide-pdf
          path: docs/dist/study-guide.pdf
